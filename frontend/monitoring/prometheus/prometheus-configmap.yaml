# Prometheus Kubernetes ConfigMap
# 用于在 Kubernetes 中挂载 Prometheus 配置

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'ai-director-prod'
        env: 'production'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      # Prometheus 自身
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # AI导演系统 - 稳定版本
      - job_name: 'ai-director-stable'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ai-director
          - source_labels: [__meta_kubernetes_pod_label_track]
            action: keep
            regex: stable
          - source_labels: [__meta_kubernetes_pod_label_version]
            target_label: version
            replacement: 'v1-stable'
          - source_labels: [__meta_kubernetes_pod_label_track]
            target_label: track
            replacement: 'stable'
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
        metrics_path: /metrics
        scrape_interval: 10s

      # AI导演系统 - 灰度版本
      - job_name: 'ai-director-canary'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ai-director
          - source_labels: [__meta_kubernetes_pod_label_track]
            action: keep
            regex: canary
          - source_labels: [__meta_kubernetes_pod_label_version]
            target_label: version
            replacement: 'v2-canary'
          - source_labels: [__meta_kubernetes_pod_label_track]
            target_label: track
            replacement: 'canary'
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
        metrics_path: /metrics
        scrape_interval: 10s

      # Nginx Ingress Controller
      - job_name: 'nginx-ingress'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - ingress-nginx
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: nginx-ingress-controller
          - source_labels: [__meta_kubernetes_pod_annotation_nginx_ingress_kubernetes_io_canary_weight]
            target_label: canary_weight
            regex: (.+)
          - source_labels: [__meta_kubernetes_ingress_name]
            target_label: ingress_name
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
        metrics_path: /metrics
        scrape_interval: 10s

      # Node Exporter
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address]
            regex: '(.*):10250'
            replacement: '${1}:9100'
            target_label: __metrics_path__
        metrics_path: /metrics

      # GPU 监控 (NVIDIA DCGM)
      - job_name: 'nvidia-gpu'
        static_configs:
          - targets: ['nvidia-dcgm-exporter:9400']
        relabel_configs:
          - source_labels: [exported_job]
            target_label: job
