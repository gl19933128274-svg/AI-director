# Alertmanager 配置文件
# 通过本地转发服务发送钉钉告警

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity', 'service', 'component']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'dingding-webhook'

receivers:
  - name: 'dingding-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/alert'
        send_resolved: false

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service', 'component']
