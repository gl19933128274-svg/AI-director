# Prometheus 配置文件
# 用于监控分镜服务的各项指标

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 规则文件
rule_files:
  - ./alerts.yml

# 抓取配置
scrape_configs:
  # 监控自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控分镜服务
  - job_name: 'storyboard-service'
    scrape_interval: 10s
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # 监控 API
  - job_name: 'storyboard-api'
    scrape_interval: 10s
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # 监控 Node Exporter（服务器指标）
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']