# AI导演系统稳定版本 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-director-stable
  namespace: production
  labels:
    app: ai-director
    track: stable
    version: v1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-director
      track: stable
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ai-director
        track: stable
        version: v1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        rollme: "{{ date | replace ":" "-" }}"
    spec:
      containers:
      - name: ai-director
        image: registry.example.com/ai-director:v1.0.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
      imagePullSecrets:
      - name: registry-secret
      restartPolicy: Always
